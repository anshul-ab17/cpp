<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #222;
    --border-hover: #333;
    --text: #e0e0e0;
    --muted: #555;
    --accent: #4ade80;
    --accent-dim: #1a3d26;
    --easy: #4ade80;
    --medium: #fb923c;
    --hard: #f87171;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  header h1 { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; white-space: nowrap; }
  header .count { font-size: 11px; color: var(--muted); }

  /* SEARCH */
  .search-wrap { flex: 1; max-width: 320px; margin-left: auto; }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    border-radius: 3px;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 53px); }

  /* SIDEBAR */
  aside {
    width: 200px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); }

  .sidebar-section { padding: 4px 12px; margin-bottom: 4px; }
  .sidebar-label { font-size: 9px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 12px 4px; }
  .filter-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: color 0.1s;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { color: var(--accent); border-left-color: var(--accent); }
  .filter-btn .pill {
    float: right;
    font-size: 9px;
    color: var(--muted);
    background: #1a1a1a;
    padding: 1px 5px;
    border-radius: 2px;
  }

  /* MAIN */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .diff-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid transparent;
    cursor: pointer;
    background: none;
  }
  .diff-btn[data-d="Easy"]  { color: var(--easy);   border-color: #1a3d26; }
  .diff-btn[data-d="Medium"]{ color: var(--medium); border-color: #3d2210; }
  .diff-btn[data-d="Hard"]  { color: var(--hard);   border-color: #3d1010; }
  .diff-btn.active[data-d="Easy"]  { background: #1a3d26; }
  .diff-btn.active[data-d="Medium"]{ background: #3d2210; }
  .diff-btn.active[data-d="Hard"]  { background: #3d1010; }
  .lang-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: none;
    color: var(--muted);
  }
  .lang-btn.active { color: var(--text); border-color: var(--muted); }
  .results-count { margin-left: auto; font-size: 10px; color: var(--muted); }

  /* LIST + CODE SPLIT */
  .split { display: flex; flex: 1; overflow: hidden; }

  /* SOLUTION LIST */
  .list-pane {
    width: 340px;
    flex-shrink: 0;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }
  .list-pane::-webkit-scrollbar { width: 4px; }
  .list-pane::-webkit-scrollbar-thumb { background: var(--border); }

  .sol-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .sol-item:hover { background: var(--surface); }
  .sol-item.active { background: var(--surface); border-left: 2px solid var(--accent); padding-left: 12px; }
  .sol-num { font-size: 10px; color: var(--muted); }
  .sol-title { font-size: 12px; color: var(--text); margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sol-meta { display: flex; gap: 6px; align-items: center; }
  .tag {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .tag.easy   { background: #1a3d26; color: var(--easy); }
  .tag.medium { background: #3d2210; color: var(--medium); }
  .tag.hard   { background: #3d1010; color: var(--hard); }
  .tag.unknown { background: #1a1a1a; color: var(--muted); }
  .tag.lang   { background: #1a1a2a; color: #7c8fff; }
  .tag.cat    { background: #1a1a1a; color: var(--muted); font-size: 8px; }

  /* CODE PANE */
  .code-pane {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .code-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .code-title { font-size: 13px; color: var(--text); font-weight: 600; }
  .code-path { font-size: 10px; color: var(--muted); margin-left: auto; }
  .copy-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 10px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    margin-left: 10px;
    transition: color 0.1s, border-color 0.1s;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--muted); }
  .copy-btn.copied { color: var(--accent); border-color: var(--accent); }
  .back-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
  }
  .back-btn:hover { color: var(--text); }
  .code-body { flex: 1; overflow: auto; padding: 0; }
  .code-body::-webkit-scrollbar { width: 6px; height: 6px; }
  .code-body::-webkit-scrollbar-track { background: var(--bg); }
  .code-body::-webkit-scrollbar-thumb { background: var(--border); }

  .code-body pre[class*="language-"] {
    margin: 0;
    padding: 20px;
    background: #1d1f21 !important;
    font-size: 12.5px;
    line-height: 1.65;
    min-height: 100%;
    border-radius: 0;
  }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    aside { display: none; }
    .list-pane { width: 100%; border-right: none; }
    .code-pane { display: none; position: fixed; inset: 0; z-index: 200; background: var(--bg); flex-direction: column; }
    .code-pane.open { display: flex; }
    .code-header { padding: 10px 12px; }
    .back-btn { display: inline-block; }
    header { padding: 10px 14px; gap: 10px; }
    header h1 { font-size: 11px; }
    .search-wrap { max-width: 200px; }
    .toolbar { flex-wrap: wrap; gap: 6px; padding: 6px 10px; }
    .split { flex-direction: column; }
  }
  @media (min-width: 769px) {
    .back-btn { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>CodeBook<span style="color:var(--muted);font-weight:400"> — LC Solutions</span></h1>
  <span class="count" id="hdr-count"></span>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="search by number or title..." autocomplete="off">
  </div>
</header>

<div class="layout">
  <aside id="sidebar"></aside>

  <main>
    <div class="toolbar">
      <button class="diff-btn active" data-d="Easy">Easy</button>
      <button class="diff-btn active" data-d="Medium">Medium</button>
      <button class="diff-btn active" data-d="Hard">Hard</button>
      <span style="color:var(--border);margin:0 4px">|</span>
      <button class="lang-btn active" data-l="cpp">C++</button>
      <button class="lang-btn active" data-l="py">Python</button>
      <span class="results-count" id="result-count"></span>
    </div>

    <div class="split">
      <div class="list-pane" id="list-pane"></div>
      <div class="code-pane" id="code-pane">
        <div class="empty-state">select a solution</div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" integrity="sha384-06z5D//U/xpvxZHuUz92xBvq3DqBBFi7Up53HRrbV7Jlv7Yvh/MZ7oenfUe9iCEt" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js" integrity="sha384-NiOrAquf32LSG3Vuig99LKS03EZPUuM8a51NOp+XXsqx08hUVo3wbNWALY7K/2J8" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" integrity="sha384-WJdEkJKrbsqw0evQ4GB6mlsKe5cGTxBOw4KAEIa52ZLB7DDpliGkwdme/HMa5n1m" crossorigin="anonymous"></script>
